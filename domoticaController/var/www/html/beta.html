<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PindaDomo</title>
  <link rel="manifest" href="/manifest.json">
  <link href='beta.css' rel='stylesheet' />
  <script src='suncalc.js'></script>
  <script src='beta.js'></script>
</head>
<body>
<div id="dashboard">
  <div id="clockdaytemp" onclick="elclick(event);"><span id="clockday">Zaterdag</span> <span id="clocktemp">19.4</span> °C</div>
  <div id="clock" onclick="elclick(event);"><span id="clockhours">20</span><span id="dots">:</span><span id="clockminutes">23</span></div>
  <div id="clockdate" onclick="elclick(event);"><span id="clockmonthday">3</span> <span id="clockmonth">april</span> <span id="clockyear" onclick="elclick(event);">2021</span></div>
</div>
<div id="menu" class="panel" style="display:none;">
  <img id="menuradio" class="menubutton" onclick="elclick(event);" src="emoji/radio.svg">
  <img id="menuweather" class="menubutton" onclick="elclick(event);" src="emoji/weather.svg">
  <img id="gotosleep" class="menubutton" onclick="elclick();" src="emoji/sleep.svg">
  <img id="config" class="menubutton" onclick="elclick();" src="emoji/config.svg">
  <img class="menubutton" onclick="location.href='index.html'" src="emoji/touchscreen.svg">
</div>
<div id="radio" class="panel" style="display:none;">
  <h1><img class="menubutton" src="emoji/radio.svg">His Master's Voice</h1>
  <audio id="radioPlayer"></audio> 
  <br>
  <div>
  <img id="radioStop" class="menubutton" onclick="radioPlay('stop')" src="emoji/stop.svg">
  <img id="radioVolumeDown" class="menubutton" onclick="radioPlay('voldown')" src="emoji/voldown.svg">
  <span id="volumeinfo"></span>
  <img id="radioVolumeUp" class="menubutton" onclick="radioPlay('volup')" src="emoji/volup.svg">
  </div>
</div>
<iframe id="weather" src="meteogram/meteogram.html" style="height:99vh; width:100vw; display:none; border:none; padding: 0; margin: 0;"></iframe>
<div id="miniclock" onclick="elclick(event);" style="display:none">20:00</div>
<div id="minitemp" onclick="elclick(event);" style="display:none">20.0 °C</div>
</body>
</html>
